# render.yaml — Infrastructure-as-Code for Render
services:
  - type: web
    name: gaslessai-backend
    runtime: node
    plan: free
    buildCommand: "npm install"
    startCommand: "node server.js"
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_NAME
        value: GaslessAI
